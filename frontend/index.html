<!doctype html>
<html lang="zh-cn">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>东方饭联地图</title>
    <script>
        // 注意：这里必须是普通 script，不能用 type="module"。
        // AMap 在加载时会读取 window._AMapSecurityConfig，若该脚本延后执行会导致代理配置失效。
        // Vite 会把 %VITE_BACKEND_URL% 注入为对应环境变量值。
        const rawEnvBackend = '%VITE_BACKEND_URL%';
        const envBackend = (rawEnvBackend && !rawEnvBackend.startsWith('%VITE_'))
            ? rawEnvBackend
            : '';

        const currentOrigin = window.location.origin;
        const currentHost = window.location.hostname;
        const isDinnerpartyHost = (h) => {
            const s = String(h || '').toLowerCase();
            return s === 'dinnerparty.cc' || s.endsWith('.dinnerparty.cc');
        };

        let backend = currentOrigin;
        if (envBackend && String(envBackend).trim()) {
            const configured = String(envBackend).replace(/\/+$/g, '');
            backend = configured;
            try {
                const envHost = new URL(configured).hostname;
                if (isDinnerpartyHost(currentHost) && isDinnerpartyHost(envHost) && currentHost !== envHost) {
                    backend = currentOrigin;
                    console.warn(`AMap serviceHost fallback to current origin due to host mismatch: ${envHost} -> ${currentHost}`);
                }
            } catch (e) {
                // Keep configured backend if URL parsing fails.
            }
        }

        window._AMapSecurityConfig = {
            serviceHost: backend + '/_AMapService'
        };
    </script>
    <script
        src="https://webapi.amap.com/maps?v=2.0&key=c92da5ff295d79be6e55c3dd2946a272&plugin=AMap.MarkerCluster,AMap.PlaceSearch,AMap.Geolocation,AMap.InfoWindow"></script>
    <style>
        :root {
            --app-height: 100vh;
        }

        @supports (height: 100dvh) {
            :root {
                --app-height: 100dvh;
            }
        }

        html,
        body,
        #root {
            height: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .panel {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 2000;
            background: white;
            padding: 8px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        input,
        textarea,
        select {
            font-size: 16px;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 24
        }
    </style>
    <link rel="stylesheet"
        href="https://fonts.font.im/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
